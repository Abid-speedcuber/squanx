<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256" role="img" aria-label="SquanX favicon">
  <defs>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Unbounded:wght@900&amp;display=swap");

      :root {
        --outline: #02050b;
        --outline-soft: #071321;
        --halo: #48cae4;
        --squan-fill: #48cae4;
        --x-fill: #e0f2fe;
      }

      .word {
        font-family: "Unbounded", Arial, sans-serif;
        font-size: 91px;
        font-weight: 900;
        letter-spacing: -7px;
        paint-order: stroke fill;
        stroke-linejoin: round;
        stroke-linecap: round;
      }

      .outline-fat {
        fill: none;
        stroke: var(--outline);
        stroke-width: 24px;
      }

      .outline-soft {
        fill: none;
        stroke: var(--outline-soft);
        stroke-width: 13px;
      }

      .fill-word {
        stroke: var(--outline);
        stroke-width: 1.5px;
      }

      .fill-sq {
        fill: var(--squan-fill);
      }

      .fill-x {
        fill: var(--x-fill);
      }
    </style>
    <filter id="lift" x="-20%" y="-45%" width="140%" height="190%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <circle cx="128" cy="128" r="106" fill="var(--halo)" opacity="0.055"/>
  <circle cx="128" cy="128" r="106" fill="none" stroke="var(--halo)" stroke-width="4" opacity="0.11"/>

  <g filter="url(#lift)">
    <text class="word outline-fat" x="26" y="160">SqX</text>
    <text class="word outline-soft" x="26" y="160">SqX</text>
    <text class="word fill-word" x="26" y="160">
      <tspan class="fill-sq">Sq</tspan><tspan class="fill-x">X</tspan>
    </text>
  </g>
</svg>
