<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SquanX</title>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@800&display=swap" rel="stylesheet">
    <link rel="icon" href="./viz/favicon.ico" sizes="any">
    <link rel="icon" type="image/png" sizes="32x32" href="./viz/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./viz/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="./viz/apple-touch-icon.png">
    <meta name="theme-color" content="#d9e9ff">
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/devtool.css">
</head>
<body>
    <div class="app-container" id="app"></div>

    <script type="module" src="./src/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js')
                .then((registration) => {
                    console.log('[SW] Registered service worker:', registration);
                })
                .catch((error) => {
                    console.error('[SW] Service worker registration failed:', error);
                });
        }
    </script>
</body>
</html>
